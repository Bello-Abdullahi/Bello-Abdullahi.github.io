---
layout: default
---
<div class="post">
  <div class="about-container clearfix" style="display: block; width: 100%;">
    
    {% if page.profile %}
    <div class="profile-sidebar" style="float: left; width: 30%; min-width: 250px; margin-right: 30px; margin-bottom: 20px; border-right: 1px solid #eee; padding-right: 20px;">
      
      {% if page.profile.image %}
        {% assign profile_image_path = page.profile.image | prepend: 'assets/img/' %}
        <img src="{{ profile_image_path | relative_url }}" 
             style="width: 100%; height: auto; border-radius: {% if page.profile.image_circular %}50%{% else %}8px{% endif %};" 
             alt="profile-photo">
      {% endif %}

      <div class="profile-info" style="margin-top: 20px; font-size: 0.95rem; line-height: 1.6;">
        
        <p>
          <strong>Email:</strong><br>
          <a href="mailto:{{ page.profile.email }}">b.abdullahi [at] lancaster.ac.uk</a>
        </p>

        <p>
          <strong>Links:</strong><br>
          <a href="{{ page.profile.scholar }}" target="_blank">Google Scholar</a><br>
          <a href="https://www.linkedin.com/in/{{ page.profile.linkedin }}" target="_blank">LinkedIn</a><br>
          <a href="https://twitter.com/{{ page.profile.twitter }}" target="_blank">Twitter</a><br>
          <a href="https://orcid.org/{{ page.profile.orcid }}" target="_blank">ORCID</a>
        </p>

        <!--
        <p>
          <strong>Mailing address:</strong><br>
          Lancaster University Management School<br>
          Bailrigg, Lancaster<br>
          LA1 4YX, United Kingdom
        </p>
        -->

      </div>
    </div>
    {% endif %}

    <div class="bio-text" style="display: block; overflow: hidden;">
       <h2 style="margin-top: 0;">Welcome to my page!</h2> {{ content }}
    </div>

  </div>
</div>

<style>
  .clearfix::after {
    content: "";
    clear: both;
    display: table;
  }

  @media (max-width: 768px) {
    .profile-sidebar {
      float: none !important;
      width: 100% !important;
      margin: 0 0 20px 0 !important;
      border-right: none !important;
      padding-right: 0 !important;
      text-align: center;
    }
  }
</style>
