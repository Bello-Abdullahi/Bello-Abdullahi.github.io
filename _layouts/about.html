---
layout: default
---
<div class="post">
  <header class="post-header">
    <h1 class="post-title">{% if site.title == "blank" -%}<span class="font-weight-bold">{{ site.first_name }}</span> {{ site.middle_name }} {{ site.last_name }}{%- else -%}{{ site.title }}{%- endif %}</h1>
    <p class="desc">{{ page.subtitle }}</p>
  </header>
  <article>
    {% if page.profile and page.profile.image %}
    <div class="profile float-right" style="max-width: 220px; margin-left: 1rem;">
      <img src="{{ '/assets/img/' | append: page.profile.image | relative_url }}" alt="{{ page.profile.image }}" class="img-fluid rounded-circle" />
    </div>
    {% endif %}
    <div class="clearfix">{{ content }}</div>
  </article>
</div>
