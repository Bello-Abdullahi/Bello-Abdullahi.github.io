<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <title>Bello Abdullahi - Personal Webpage</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Personal webpage of Bello Abdullahi."/>
    <meta name="robots" content="index,follow" />

{% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <!--[if lt IE 9]>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1><a href="{{ "/" | absolute_url }}">{{ site.title | default: site.github.repository_name }}</a></h1>

        <div style="display:block;margin:0 auto;text-align:center">
          <p>{{ site.description | default: site.github.project_tagline }}</p>

          <img src="{{ site.logo | relative_url }}" alt="Logo" style="width:230px" />

          <p>
            <br><b>E-mail</b>:
            <br>bello.abdullahi "at" example.com

            <br>
            <br><b>Links</b>:
            <br><a href="https://github.com/Bello-Abdullahi" target="_blank">GitHub</a>
            <br><a href="https://www.linkedin.com/in/bello-abdullahi" target="_blank">LinkedIn</a>
          </p>
        </div>
      </header>
      <section>

        {{ content }}

      </section>
    </div>
  </body>
</html>
